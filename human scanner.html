<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock Review Browser</title>

<!--
  Fonts: a monospace face for ticker symbols / numeric readouts (the things
  you actually scan while reviewing charts), and a plain sans face for
  buttons and labels. Loaded from Google Fonts CDN -- requires the viewer's
  browser to have internet access (separate from any TradingView data).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  /* ==========================================================================
     DESIGN TOKENS
     ========================================================================== */
  :root {
    --bg:            #0a0e14;
    --panel:         #11161f;
    --panel-border:  #232a36;
    --chart-bg:      #0d1117;

    --text-primary:   #e7ecf3;
    --text-secondary: #7c8798;
    --text-dim:       #4b5563;

    --accent:        #3ddc97; /* playing / healthy */
    --accent-dim:    rgba(61, 220, 151, 0.14);
    --amber:         #e3a008; /* paused */
    --amber-dim:     rgba(227, 160, 8, 0.14);
    --red:           #f0566a; /* complete / stop */
    --red-dim:       rgba(240, 86, 106, 0.14);

    --radius: 6px;
    --mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--sans);
    overflow: hidden; /* the chart owns all scrolling/zooming, not the page */
  }

  /* ==========================================================================
     LAYOUT SHELL
     ========================================================================== */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ---- Header / control bar ------------------------------------------- */
  #header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 10px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-border);
    flex-wrap: wrap;
  }

  .hdr-group {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* Ticker readout */
  .ticker-symbol {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.04em;
    min-width: 132px;
  }

  .ticker-position {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  /* Status pill */
  .status-pill {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .status-pill.playing { background: var(--accent-dim); color: var(--accent); }
  .status-pill.paused  { background: var(--amber-dim);  color: var(--amber); }
  .status-pill.complete{ background: var(--red-dim);    color: var(--red); }

  .countdown-readout {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text-secondary);
    white-space: nowrap;
    min-width: 86px;
  }
  .countdown-readout strong {
    color: var(--text-primary);
    font-size: 17px;
  }

  /* Interval control */
  .interval-control {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .interval-control input {
    width: 44px;
    background: var(--bg);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 6px;
    text-align: center;
  }
  .interval-control input:focus { outline: none; border-color: var(--accent); }

  /* Buttons */
  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-primary);
    background: var(--bg);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    padding: 8px 12px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .btn:hover    { border-color: var(--accent); color: var(--accent); }
  .btn:active   { transform: translateY(1px); }
  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .btn:disabled:hover { border-color: var(--panel-border); color: var(--text-primary); }

  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.open     { border-color: var(--text-secondary); }

  /* ---- Countdown progress strip ---------------------------------------- */
  #progress-track {
    flex: 0 0 auto;
    height: 3px;
    background: var(--panel-border);
  }
  #progress-fill {
    height: 100%;
    width: 100%;
    background: var(--accent);
    transition: width 1s linear, background 0.2s ease;
  }
  #progress-fill.paused   { background: var(--amber); transition: background 0.2s ease; }
  #progress-fill.complete { background: var(--red); }

  /* ---- Complete banner --------------------------------------------------*/
  #complete-banner {
    flex: 0 0 auto;
    display: none; /* toggled to flex when review finishes */
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 18px;
    background: var(--red-dim);
    border-bottom: 1px solid var(--panel-border);
    font-family: var(--mono);
    font-size: 13px;
    color: var(--red);
  }
  #complete-banner .btn { color: var(--red); border-color: var(--red); }

  /* ---- Chart area -------------------------------------------------------*/
  #chart-area {
    flex: 1 1 auto;
    position: relative;
    background: var(--chart-bg);
    min-height: 0; /* allow flex child to actually fill remaining space */
  }
  #chart-container { width: 100%; height: 100%; }

  .chart-message {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    color: var(--text-secondary);
    font-family: var(--mono);
    font-size: 14px;
    text-align: center;
    padding: 24px;
  }
  .chart-message code {
    color: var(--text-primary);
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    padding: 2px 6px;
  }

  /* Small screens: let the header wrap instead of clipping controls */
  @media (max-width: 760px) {
    #header { gap: 12px; }
    .hdr-group { gap: 8px; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- ============================ HEADER / STATUS BAR ===================== -->
  <div id="header">

    <!-- Left: which ticker, which position in the list -->
    <div class="hdr-group">
      <div class="ticker-symbol" id="ticker-symbol">--</div>
      <div class="ticker-position" id="ticker-position">0 / 0</div>
    </div>

    <!-- Center: play status + countdown -->
    <div class="hdr-group">
      <div class="status-pill playing" id="status-pill">Playing</div>
      <div class="countdown-readout" id="countdown-readout">Next in <strong id="countdown-value">--</strong>s</div>
      <div class="interval-control">
        <label for="interval-input">Interval</label>
        <input type="number" id="interval-input" min="1" max="120" step="1" value="30" />
        <span>s</span>
      </div>
    </div>

    <!-- Right: transport controls -->
    <div class="hdr-group">
      <button class="btn" id="btn-prev"   title="Previous (&larr;)">Prev</button>
      <button class="btn primary" id="btn-playpause" title="Pause / Resume (Space)">Pause</button>
      <button class="btn" id="btn-next"   title="Next (&rarr;)">Next</button>
      <button class="btn" id="btn-restart" title="Restart (R)">Restart</button>
      <button class="btn open" id="btn-open" title="Open current ticker on TradingView in a new tab">Open Current Stock</button>
    </div>

  </div>

  <!-- ============================ COUNTDOWN PROGRESS STRIP ================= -->
  <div id="progress-track">
    <div id="progress-fill"></div>
  </div>

  <!-- ============================ REVIEW COMPLETE BANNER =================== -->
  <div id="complete-banner">
    <span id="complete-banner-text">Review Complete</span>
    <div class="hdr-group">
      <button class="btn" id="btn-banner-restart">Restart</button>
      <button class="btn" id="btn-banner-dismiss">Dismiss</button>
    </div>
  </div>

  <!-- ============================ CHART AREA ================================ -->
  <div id="chart-area">
    <div id="chart-container"></div>
  </div>

</div>

<!-- Ticker list. Edit stocks.js to load a different watchlist / scanner output. -->
<script src="stocks.js"></script>

<script>
(function () {
  "use strict";

  // ==========================================================================
  // CONFIG
  // Tunable defaults. Safe to change without touching the logic below.
  // ==========================================================================
  const CONFIG = {
    defaultIntervalSeconds: 30,   // auto-advance speed
    chartInterval: "D",           // "D" = daily. Do not default to weekly/monthly.
    chartTheme: "dark",
    tvScriptUrl: "https://s3.tradingview.com/tv.js",

    // Default indicators applied to every chart on load.
    // Reference: TradingView basic-studies input names --
    //   MASimple@tv-basicstudies -> { length }
    //   BB@tv-basicstudies       -> { length, mult }  (mult = the StdDev multiplier)
    studies: [
      { id: "MASimple@tv-basicstudies", version: 60, inputs: { length: 50 } },
      { id: "MASimple@tv-basicstudies", version: 60, inputs: { length: 200 } },
      { id: "BB@tv-basicstudies", version: 60, inputs: { length: 20, mult: 2 } },
    ],
  };

  // ==========================================================================
  // STATE
  // Single mutable object holding everything about "where we are" in the
  // review session. Keeping this centralized makes the control flow below
  // easy to follow and easy to extend (e.g. add shuffle, add tagging, etc).
  // ==========================================================================
  const state = {
    stocks: (typeof STOCKS !== "undefined" && Array.isArray(STOCKS))
      ? STOCKS.map(s => String(s).trim().toUpperCase()).filter(Boolean)
      : [],
    currentIndex: 0,
    isPlaying: true,
    isComplete: false,
    intervalSeconds: CONFIG.defaultIntervalSeconds,
    remainingSeconds: CONFIG.defaultIntervalSeconds,
    timerId: null,          // setInterval handle for the 1-second tick
    widgetSeq: 0,           // bump on every chart load to give each TradingView
                             // widget container a fresh, unique id
    tvReady: null,          // Promise that resolves once tv.js has loaded
  };

  // ==========================================================================
  // DOM REFERENCES
  // ==========================================================================
  const el = {
    tickerSymbol:    document.getElementById("ticker-symbol"),
    tickerPosition:  document.getElementById("ticker-position"),
    statusPill:      document.getElementById("status-pill"),
    countdownValue:  document.getElementById("countdown-value"),
    intervalInput:   document.getElementById("interval-input"),
    progressFill:    document.getElementById("progress-fill"),
    chartContainer:  document.getElementById("chart-container"),
    chartArea:       document.getElementById("chart-area"),
    completeBanner:  document.getElementById("complete-banner"),
    completeBannerText: document.getElementById("complete-banner-text"),
    btnPrev:         document.getElementById("btn-prev"),
    btnNext:         document.getElementById("btn-next"),
    btnPlayPause:    document.getElementById("btn-playpause"),
    btnRestart:      document.getElementById("btn-restart"),
    btnOpen:         document.getElementById("btn-open"),
    btnBannerRestart: document.getElementById("btn-banner-restart"),
    btnBannerDismiss: document.getElementById("btn-banner-dismiss"),
  };

  // ==========================================================================
  // TRADINGVIEW CHART LOADING
  // ==========================================================================

  /**
   * Loads the TradingView widget script exactly once and caches the promise
   * so every later chart switch can just `await` it.
   */
  function ensureTradingViewScriptLoaded() {
    if (state.tvReady) return state.tvReady;

    state.tvReady = new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = CONFIG.tvScriptUrl;
      script.async = true;
      script.onload = () => resolve();
      script.onerror = () => reject(new Error("Failed to load TradingView widget script"));
      document.head.appendChild(script);
    });

    return state.tvReady;
  }

  /**
   * Tears down whatever is currently in the chart container and mounts a
   * fresh TradingView "Advanced Chart" widget for the given symbol. This is
   * the full embedded TradingView experience -- zoom, pan, timeframe
   * switching, indicators, comparison, drawing tools all work natively
   * inside the widget's own iframe, the same as on tradingview.com.
   *
   * We rebuild the widget (rather than trying to push a symbol change into
   * an existing one) because that's the officially supported way to switch
   * symbols on this embed, and it guarantees every new ticker opens fresh
   * on the Daily timeframe as required.
   */
  function loadChart(symbol) {
    state.widgetSeq += 1;
    const containerId = "tv-widget-" + state.widgetSeq;

    el.chartContainer.innerHTML = "";
    const widgetDiv = document.createElement("div");
    widgetDiv.id = containerId;
    widgetDiv.style.width = "100%";
    widgetDiv.style.height = "100%";
    el.chartContainer.appendChild(widgetDiv);

    ensureTradingViewScriptLoaded()
      .then(() => {
        // Guard against a stale load resolving after the user has already
        // clicked elsewhere (e.g. rapid Next/Next/Next clicking).
        if (!document.getElementById(containerId)) return;

        /* global TradingView */
        new TradingView.widget({
          container_id: containerId,
          autosize: true,
          symbol: symbol,
          interval: CONFIG.chartInterval, // Daily by default, per spec
          timezone: "Etc/UTC",
          theme: CONFIG.chartTheme,
          style: "1",
          locale: "en",
          toolbar_bg: "#11161f",
          enable_publishing: false,
          allow_symbol_change: true, // user can still free-type other symbols
          hide_top_toolbar: false,
          hide_side_toolbar: false,
          withdateranges: true,
          details: false,
          studies: CONFIG.studies,
        });
      })
      .catch((err) => {
        el.chartContainer.innerHTML =
          '<div class="chart-message">Could not load TradingView.<br>' +
          "Check your internet connection and reload.<br><br>" +
          "<code>" + err.message + "</code></div>";
      });
  }

  // ==========================================================================
  // STATUS BAR RENDERING
  // ==========================================================================

  function renderStatusBar() {
    const total = state.stocks.length;
    const symbol = total ? state.stocks[state.currentIndex] : "--";

    el.tickerSymbol.textContent = symbol;
    el.tickerPosition.textContent = total
      ? (state.currentIndex + 1) + " / " + total
      : "0 / 0";

    el.countdownValue.textContent = state.remainingSeconds;

    // Status pill + progress bar colour follow the same three states.
    el.statusPill.classList.remove("playing", "paused", "complete");
    el.progressFill.classList.remove("paused", "complete");

    if (state.isComplete) {
      el.statusPill.classList.add("complete");
      el.statusPill.textContent = "Complete";
      el.progressFill.classList.add("complete");
    } else if (state.isPlaying) {
      el.statusPill.classList.add("playing");
      el.statusPill.textContent = "Playing";
      el.progressFill.classList.remove("complete");
    } else {
      el.statusPill.classList.add("paused");
      el.statusPill.textContent = "Paused";
      el.progressFill.classList.add("paused");
    }

    el.btnPlayPause.textContent = state.isPlaying ? "Pause" : "Resume";
    el.btnPlayPause.disabled = state.isComplete;
    el.btnNext.disabled = state.isComplete || total === 0;
    el.btnPrev.disabled = total === 0 || state.currentIndex === 0;
    el.btnOpen.disabled = total === 0;

    updateProgressFillWidth();
  }

  function updateProgressFillWidth() {
    const pct = state.intervalSeconds > 0
      ? (state.remainingSeconds / state.intervalSeconds) * 100
      : 0;
    el.progressFill.style.width = Math.max(0, Math.min(100, pct)) + "%";
  }

  // ==========================================================================
  // COUNTDOWN / AUTOPLAY TIMER
  // ==========================================================================

  function stopCountdownTimer() {
    if (state.timerId !== null) {
      clearInterval(state.timerId);
      state.timerId = null;
    }
  }

  /** (Re)starts the 1-second tick from a full interval. */
  function startCountdownTimer() {
    stopCountdownTimer();
    state.remainingSeconds = state.intervalSeconds;
    renderStatusBar();

    state.timerId = setInterval(() => {
      state.remainingSeconds -= 1;

      if (state.remainingSeconds <= 0) {
        goToNext();        // goToNext() restarts the timer itself if appropriate
      } else {
        renderStatusBar();
      }
    }, 1000);
  }

  // ==========================================================================
  // NAVIGATION
  // ==========================================================================

  function loadCurrentStock() {
    if (state.stocks.length === 0) {
      el.chartContainer.innerHTML =
        '<div class="chart-message">No tickers found.<br>' +
        "Add symbols to <code>stocks.js</code> (the <code>STOCKS</code> array) " +
        "next to this file, then reload.</div>";
      return;
    }
    loadChart(state.stocks[state.currentIndex]);
  }

  /**
   * Advances to the next ticker. Used both by the auto-advance timer and by
   * the manual "Next" button -- pass manual=true to indicate a user click
   * (currently only affects nothing extra, but kept distinct for clarity /
   * future extension, e.g. logging manual skips separately from auto skips).
   */
  function goToNext(manual) {
    if (state.stocks.length === 0) return;

    const isLast = state.currentIndex >= state.stocks.length - 1;

    if (isLast) {
      // End of list reached: stop, do not loop, show Review Complete.
      stopCountdownTimer();
      state.isPlaying = false;
      state.isComplete = true;
      state.remainingSeconds = 0;
      showCompleteBanner();
      renderStatusBar();
      return;
    }

    state.currentIndex += 1;
    loadCurrentStock();

    if (state.isPlaying) {
      startCountdownTimer();
    } else {
      state.remainingSeconds = state.intervalSeconds;
      renderStatusBar();
    }
  }

  function goToPrev() {
    if (state.stocks.length === 0 || state.currentIndex === 0) return;

    state.currentIndex -= 1;
    loadCurrentStock();

    if (state.isPlaying) {
      startCountdownTimer();
    } else {
      state.remainingSeconds = state.intervalSeconds;
      renderStatusBar();
    }
  }

  function pause() {
    if (state.isComplete) return;
    state.isPlaying = false;
    stopCountdownTimer();
    renderStatusBar();
  }

  function resume() {
    if (state.isComplete || state.stocks.length === 0) return;
    state.isPlaying = true;
    startCountdownTimer();
  }

  function togglePlayPause() {
    if (state.isPlaying) pause(); else resume();
  }

  function restart() {
    stopCountdownTimer();
    state.currentIndex = 0;
    state.isPlaying = true;
    state.isComplete = false;
    hideCompleteBanner();
    loadCurrentStock();
    if (state.stocks.length > 0) {
      startCountdownTimer();
    } else {
      renderStatusBar();
    }
  }

  function openCurrentStock() {
    if (state.stocks.length === 0) return;
    const symbol = state.stocks[state.currentIndex];
    const url = "https://www.tradingview.com/chart/?symbol=" + encodeURIComponent(symbol);
    window.open(url, "_blank", "noopener");
  }

  // ==========================================================================
  // COMPLETE BANNER
  // ==========================================================================

  function showCompleteBanner() {
    el.completeBannerText.textContent =
      "Review Complete \u2014 reviewed all " + state.stocks.length + " tickers.";
    el.completeBanner.style.display = "flex";
  }

  function hideCompleteBanner() {
    el.completeBanner.style.display = "none";
  }

  // ==========================================================================
  // EVENT WIRING
  // ==========================================================================

  el.btnPrev.addEventListener("click", goToPrev);
  el.btnNext.addEventListener("click", () => goToNext(true));
  el.btnPlayPause.addEventListener("click", togglePlayPause);
  el.btnRestart.addEventListener("click", restart);
  el.btnOpen.addEventListener("click", openCurrentStock);
  el.btnBannerRestart.addEventListener("click", restart);
  el.btnBannerDismiss.addEventListener("click", hideCompleteBanner);

  el.intervalInput.addEventListener("change", () => {
    let val = parseInt(el.intervalInput.value, 10);
    if (!Number.isFinite(val) || val < 1) val = 1;
    if (val > 120) val = 120;
    el.intervalInput.value = val;
    state.intervalSeconds = val;
    // Applied from the next full countdown onward; if currently playing,
    // restart now so the new interval takes effect immediately.
    if (state.isPlaying && !state.isComplete) {
      startCountdownTimer();
    } else {
      state.remainingSeconds = Math.min(state.remainingSeconds, val);
      renderStatusBar();
    }
  });

  document.addEventListener("keydown", (e) => {
    // Don't hijack typing into the interval input.
    const tag = (e.target && e.target.tagName) || "";
    if (tag === "INPUT" || tag === "TEXTAREA") return;

    switch (e.key) {
      case "ArrowRight":
        e.preventDefault();
        goToNext(true);
        break;
      case "ArrowLeft":
        e.preventDefault();
        goToPrev();
        break;
      case " ":
        e.preventDefault();
        togglePlayPause();
        break;
      case "r":
      case "R":
        e.preventDefault();
        restart();
        break;
    }
  });

  // ==========================================================================
  // INIT
  // ==========================================================================

  function init() {
    el.intervalInput.value = state.intervalSeconds;
    loadCurrentStock();

    if (state.stocks.length === 0) {
      renderStatusBar();
      return;
    }

    startCountdownTimer();
  }

  init();
})();
</script>

</body>
</html>
