<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<div id="root"></div>
<style>
  :root {
    --bg: #0b0e0d;
    --panel: #111513;
    --line: #1f2b24;
    --text: #d8e6db;
    --muted: #6f8478;
    --accent: #4fd1a5;
    --accent-dim: #2a6b50;
    --warn: #e0a64f;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { background: transparent; margin: 0; }
  #root { font-family: var(--mono); color: var(--text); }

  .wrap { display: flex; flex-direction: column; gap: 14px; }

  .top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .title {
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .sub {
    font-size: 12px;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 720px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    height: 360px;
  }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .panel-head .count {
    color: var(--accent);
    font-weight: 600;
  }

  .big-count {
    display: flex;
    align-items: baseline;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--accent-dim);
    border-radius: 6px;
    padding: 10px 16px;
  }
  .big-count .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .big-count .label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  textarea {
    flex: 1;
    min-height: 0;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 20px;
    padding: 12px;
    white-space: pre;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--muted); }

  pre.output {
    flex: 1;
    min-height: 0;
    margin: 0;
    padding: 12px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    overflow: auto;
    white-space: pre;
  }
  .tok-kw { color: #7aa2c4; }
  .tok-str { color: var(--accent); }
  .tok-punc { color: var(--muted); }
  .tok-com { color: var(--muted); font-style: italic; }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    background: var(--accent-dim);
    color: #eafff4;
    border: 1px solid var(--accent);
    border-radius: 5px;
    padding: 7px 14px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s ease, transform 0.05s ease;
  }
  .btn:hover { background: var(--accent); color: #08120d; }
  .btn:active { transform: translateY(1px); }
  .btn.secondary {
    background: transparent;
    color: var(--muted);
    border-color: var(--line);
  }
  .btn.secondary:hover { color: var(--text); border-color: var(--muted); background: transparent; }

  .flags {
    display: flex;
    gap: 14px;
    font-size: 11.5px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .flags label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .flags input { accent-color: var(--accent); cursor: pointer; }

  .notice {
    font-size: 11.5px;
    padding: 8px 12px;
    border-radius: 5px;
    border: 1px solid var(--line);
    color: var(--muted);
  }
  .notice.warn {
    border-color: #4a3a1f;
    color: var(--warn);
    background: rgba(224, 166, 79, 0.06);
  }
  .notice b { color: var(--text); }

  .removed-list {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    word-break: break-all;
  }

  .copied {
    color: var(--accent);
    font-size: 11px;
  }

  .footer-hint {
    font-size: 11px;
    color: var(--muted);
  }
  .footer-hint code {
    color: var(--text);
    background: rgba(255,255,255,0.04);
    padding: 1px 5px;
    border-radius: 3px;
  }

  .folder-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--panel);
  }
  .folder-bar .fb-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .folder-bar .fb-path {
    font-size: 12.5px;
    color: var(--accent);
    font-weight: 600;
  }
  .folder-bar .fb-path.unset {
    color: var(--muted);
    font-weight: 400;
    font-style: italic;
  }
  .folder-bar.error {
    border-color: #6b2a2a;
    background: rgba(224, 79, 79, 0.06);
  }
  .fb-error-text {
    font-size: 12px;
    color: #e88a8a;
  }

  .btn.secondary:disabled,
  .btn.secondary:disabled:hover {
    opacity: 1;
    cursor: not-allowed;
    background: transparent;
    color: #3c4943;
    border-color: #1a221d;
  }

  .history-hint {
    font-size: 10.5px;
    color: var(--muted);
  }
  .history-hint kbd {
    font-family: var(--mono);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 0px 5px;
    font-size: 10px;
    color: var(--text);
  }

  .textarea-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    display: flex;
  }
  .flash-line {
    position: absolute;
    left: 0;
    right: 0;
    pointer-events: none;
    background: rgba(79, 209, 165, 0.22);
    border-top: 1px solid rgba(79, 209, 165, 0.6);
    border-bottom: 1px solid rgba(79, 209, 165, 0.6);
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .flash-line.show {
    opacity: 1;
    transition: opacity 0.15s ease;
  }
  .flash-line.fade {
    opacity: 0;
    transition: opacity 0.9s ease;
  }
</style>

<script type="text/babel">
const { useState, useMemo, useCallback, useRef, useEffect } = React;

function parseTickers(raw) {
  if (!raw) return [];
  // Split on any whitespace / newline / CR / comma
  return raw
    .split(/[\r\n,]+/)
    .map(s => s.trim())
    .filter(Boolean);
}

function isValidTicker(t) {
  // Allow letters, digits, dot, hyphen (e.g. BF.B, BRK.A, TAP.A) — typical ticker shapes
  return /^[A-Z0-9]{1,6}(\.[A-Z]{1,3})?$/.test(t);
}

function buildJs(tickers, varName) {
  const lines = tickers.map((t, i) => {
    const comma = i < tickers.length - 1 ? "," : "";
    return `    "${t}"${comma}`;
  });
  return [
    `const ${varName} = [`,
    ...lines,
    `];`
  ].join("\n");
}

function highlightJs(code) {
  // Lightweight syntax coloring for display only
  const escaped = code
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
  return escaped
    .replace(/\b(const)\b/g, '<span class="tok-kw">$1</span>')
    .replace(/"([^"]*)"/g, '<span class="tok-str">"$1"</span>')
    .replace(/([\[\]{};,=])/g, '<span class="tok-punc">$1</span>');
}

function App() {
  const [raw, setRaw] = useState("");
  const [varName, setVarName] = useState("STOCKS");
  const [dedupe, setDedupe] = useState(true);
  const [sortAlpha, setSortAlpha] = useState(false);
  const [uppercase, setUppercase] = useState(true);
  const [copied, setCopied] = useState(false);
  const [savedVia, setSavedVia] = useState(null);
  const [folderHandle, setFolderHandle] = useState(null);
  const [folderName, setFolderName] = useState(null);
  const [folderError, setFolderError] = useState(null);

  const supportsFS = !!window.showDirectoryPicker;

  // ---- Jump-to-change on undo/redo ----
  const textareaRef = useRef(null);
  const [flashLine, setFlashLine] = useState(null); // { top, show }
  const LINE_HEIGHT = 20; // px, matches textarea font-size 12.5px * line-height 1.6
  const programmaticScrollRef = useRef(false);

  // Finds the index of the first line that differs between two texts.
  const firstDiffLine = useCallback((a, b) => {
    const aLines = a.split("\n");
    const bLines = b.split("\n");
    const max = Math.max(aLines.length, bLines.length);
    for (let i = 0; i < max; i++) {
      if (aLines[i] !== bLines[i]) return i;
    }
    return 0;
  }, []);

  const jumpToLine = useCallback((lineIndex) => {
    const ta = textareaRef.current;
    if (!ta) return;
    const PAD_TOP = 12; // matches textarea's CSS padding
    const targetScroll = Math.max(0, lineIndex * LINE_HEIGHT - ta.clientHeight / 2 + LINE_HEIGHT / 2);
    programmaticScrollRef.current = true;
    ta.scrollTop = targetScroll;

    // Position the flash overlay at this line, relative to the textarea's
    // current scroll position, then fade it out after a moment.
    const top = PAD_TOP + lineIndex * LINE_HEIGHT - ta.scrollTop;
    setFlashLine({ top, show: true });
    requestAnimationFrame(() => {
      programmaticScrollRef.current = false;
      setTimeout(() => setFlashLine(f => f && { ...f, show: false }), 700);
    });
  }, []);

  // ---- Undo/Redo history ----
  // `history` holds past textarea snapshots, `future` holds states we've
  // undone past (so redo can restore them). We snapshot on a short typing
  // pause rather than every keystroke, plus immediately before destructive
  // actions like Clear, so each undo step feels like a meaningful edit.
  const [history, setHistory] = useState([]);
  const [future, setFuture] = useState([]);
  const debounceRef = useRef(null);
  const lastSnapshotRef = useRef("");
  const skipNextSnapshotRef = useRef(false);

  const snapshotNow = useCallback((text) => {
    if (text === lastSnapshotRef.current) return;
    setHistory(h => [...h.slice(-49), lastSnapshotRef.current]); // cap at 50 steps
    lastSnapshotRef.current = text;
    setFuture([]); // any new edit clears redo stack
  }, []);

  const handleRawChange = useCallback((newVal) => {
    if (skipNextSnapshotRef.current) {
      // Change came from Undo/Redo/Clear — don't debounce-snapshot it again.
      skipNextSnapshotRef.current = false;
      lastSnapshotRef.current = newVal;
      setRaw(newVal);
      return;
    }
    if (debounceRef.current) clearTimeout(debounceRef.current);
    const prev = raw;
    debounceRef.current = setTimeout(() => {
      snapshotNow(prev);
    }, 600);
    setRaw(newVal);
  }, [raw, snapshotNow]);

  const handleUndo = useCallback(() => {
    if (history.length === 0) return;
    if (debounceRef.current) clearTimeout(debounceRef.current);
    const prevState = history[history.length - 1];
    const current = raw;
    setHistory(h => h.slice(0, -1));
    setFuture(f => [current, ...f]);
    skipNextSnapshotRef.current = true;
    lastSnapshotRef.current = prevState;
    setRaw(prevState);

    const diffLine = firstDiffLine(current, prevState);
    requestAnimationFrame(() => jumpToLine(diffLine));
  }, [history, raw, firstDiffLine, jumpToLine]);

  const handleRedo = useCallback(() => {
    if (future.length === 0) return;
    if (debounceRef.current) clearTimeout(debounceRef.current);
    const nextState = future[0];
    const current = raw;
    setFuture(f => f.slice(1));
    setHistory(h => [...h, current]);
    skipNextSnapshotRef.current = true;
    lastSnapshotRef.current = nextState;
    setRaw(nextState);

    const diffLine = firstDiffLine(current, nextState);
    requestAnimationFrame(() => jumpToLine(diffLine));
  }, [future, raw, firstDiffLine, jumpToLine]);

  // Ctrl/Cmd+Z to undo, Ctrl/Cmd+Shift+Z (or Ctrl+Y) to redo
  useEffect(() => {
    const onKeyDown = (e) => {
      const meta = e.ctrlKey || e.metaKey;
      if (!meta) return;
      if (e.key.toLowerCase() === "z" && !e.shiftKey) {
        e.preventDefault();
        handleUndo();
      } else if ((e.key.toLowerCase() === "z" && e.shiftKey) || e.key.toLowerCase() === "y") {
        e.preventDefault();
        handleRedo();
      }
    };
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, [handleUndo, handleRedo]);

  const parsed = useMemo(() => {
    let list = parseTickers(raw);
    if (uppercase) list = list.map(t => t.toUpperCase());

    const invalid = [];
    const valid = [];
    for (const t of list) {
      if (isValidTicker(t)) valid.push(t);
      else invalid.push(t);
    }

    let seenOrder = valid;
    let dupCount = 0;
    if (dedupe) {
      const seen = new Set();
      const out = [];
      for (const t of valid) {
        if (seen.has(t)) { dupCount++; continue; }
        seen.add(t);
        out.push(t);
      }
      seenOrder = out;
    }

    if (sortAlpha) {
      seenOrder = [...seenOrder].sort((a, b) => a.localeCompare(b));
    }

    return {
      final: seenOrder,
      invalid,
      dupCount,
      totalRaw: list.length
    };
  }, [raw, dedupe, sortAlpha, uppercase]);

  const jsCode = useMemo(
    () => buildJs(parsed.final, varName.trim() || "STOCKS"),
    [parsed.final, varName]
  );

  const handleCopy = useCallback(() => {
    navigator.clipboard.writeText(jsCode).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  }, [jsCode]);

  const handleChooseFolder = useCallback(async () => {
    if (!supportsFS) return;
    try {
      const handle = await window.showDirectoryPicker({ mode: "readwrite" });
      setFolderHandle(handle);
      setFolderName(handle.name);
      setFolderError(null);
    } catch (err) {
      // User cancelled — leave existing state untouched.
    }
  }, [supportsFS]);

  const handleDownload = useCallback(async () => {
    const filename = "stocks.js";
    const content = jsCode + "\n";

    // Path A: a folder is remembered for this session — write straight into it, no dialog.
    if (folderHandle) {
      try {
        // Re-confirm we still have write permission (can be revoked, or the
        // folder may have been moved/deleted since it was chosen).
        const perm = await folderHandle.queryPermission({ mode: "readwrite" });
        if (perm !== "granted") {
          const req = await folderHandle.requestPermission({ mode: "readwrite" });
          if (req !== "granted") throw new Error("permission-denied");
        }
        const fileHandle = await folderHandle.getFileHandle(filename, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(content);
        await writable.close();
        setFolderError(null);
        setSavedVia("folder");
        setTimeout(() => setSavedVia(null), 2000);
        return;
      } catch (err) {
        // The remembered folder is gone, renamed, or permission was revoked.
        setFolderError(
          `Couldn't write to "${folderName}" — it may have been moved, renamed, or deleted. Choose the folder again.`
        );
        setFolderHandle(null);
        setFolderName(null);
        // fall through to the generic save path below
      }
    }

    // Path B: no remembered folder — use the native "Save As" picker if available.
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{ description: "JavaScript file", accept: { "text/javascript": [".js"] } }]
        });
        const writable = await handle.createWritable();
        await writable.write(content);
        await writable.close();
        setSavedVia("picker");
        setTimeout(() => setSavedVia(null), 2000);
        return;
      } catch (err) {
        if (err && err.name === "AbortError") return;
        // fall through to plain download
      }
    }

    // Path C: plain download fallback (e.g. Firefox/Safari).
    const blob = new Blob([content], { type: "text/javascript" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setSavedVia("download");
    setTimeout(() => setSavedVia(null), 2000);
  }, [jsCode, folderHandle, folderName]);

  const handleClear = useCallback(() => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    snapshotNow(raw);
    skipNextSnapshotRef.current = true;
    lastSnapshotRef.current = "";
    setRaw("");
  }, [raw, snapshotNow]);

  return (
    <div className="wrap">
      <div className="top">
        <div className="title">Ticker List → stocks.js</div>
        <div className="big-count">
          <span className="num">{parsed.final.length}</span>
          <span className="label">tickers</span>
        </div>
      </div>

      <div className="row">
        <label className="footer-hint" style={{display:"flex", alignItems:"center", gap:6}}>
          var name:
          <input
            value={varName}
            onChange={e => setVarName(e.target.value.toUpperCase().replace(/[^A-Z0-9_]/g, ""))}
            style={{
              background: "var(--panel)",
              border: "1px solid var(--line)",
              borderRadius: 4,
              color: "var(--accent)",
              fontFamily: "var(--mono)",
              fontSize: 12,
              padding: "4px 8px",
              width: 110
            }}
          />
        </label>
        <div className="flags">
          <label><input type="checkbox" checked={dedupe} onChange={e => setDedupe(e.target.checked)} /> remove duplicates</label>
          <label><input type="checkbox" checked={sortAlpha} onChange={e => setSortAlpha(e.target.checked)} /> sort A→Z</label>
          <label><input type="checkbox" checked={uppercase} onChange={e => setUppercase(e.target.checked)} /> force UPPERCASE</label>
        </div>
      </div>

      {supportsFS && (
        <div className={`folder-bar ${folderError ? "error" : ""}`}>
          <span className="fb-label">Save folder:</span>
          {folderName
            ? <span className="fb-path">{folderName}/</span>
            : <span className="fb-path unset">not set — will ask each time</span>}
          <button className="btn secondary" onClick={handleChooseFolder} style={{ padding: "4px 10px", fontSize: 11 }}>
            {folderName ? "Change folder" : "Set folder"}
          </button>
          {folderError && <span className="fb-error-text">{folderError}</span>}
        </div>
      )}

      <div className="grid">
        <div className="panel">
          <div className="panel-head">
            <span>paste tickers (one per line, or comma/space separated)</span>
            <span className="count">{parsed.totalRaw} parsed</span>
          </div>
          <div className="textarea-wrap">
            <textarea
              ref={textareaRef}
              placeholder={"NVTS\nON\nMPWR\nVICR\n...\n\n(paste your full list here)"}
              value={raw}
              onChange={e => handleRawChange(e.target.value)}
              onScroll={() => { if (!programmaticScrollRef.current) setFlashLine(null); }}
              spellCheck={false}
            />
            {flashLine && (
              <div
                className={`flash-line ${flashLine.show ? "show" : "fade"}`}
                style={{ top: flashLine.top, height: LINE_HEIGHT }}
              />
            )}
          </div>
        </div>

        <div className="panel">
          <div className="panel-head">
            <span>stocks.js output</span>
            <span className="count">{parsed.final.length} tickers</span>
          </div>
          <pre className="output" dangerouslySetInnerHTML={{ __html: highlightJs(jsCode) }} />
        </div>
      </div>

      {(parsed.dupCount > 0 || parsed.invalid.length > 0) && (
        <div className="notice warn">
          {parsed.dupCount > 0 && <div><b>{parsed.dupCount}</b> duplicate{parsed.dupCount === 1 ? "" : "s"} removed.</div>}
          {parsed.invalid.length > 0 && (
            <div>
              <b>{parsed.invalid.length}</b> entr{parsed.invalid.length === 1 ? "y" : "ies"} skipped — didn't look like a valid ticker:
              <div className="removed-list">{parsed.invalid.slice(0, 40).join(", ")}{parsed.invalid.length > 40 ? " …" : ""}</div>
            </div>
          )}
        </div>
      )}

      <div className="row" style={{ justifyContent: "space-between" }}>
        <div className="row">
          <button className="btn" onClick={handleCopy}>Copy JS</button>
          <button className="btn" onClick={handleDownload}>
            {folderName ? `Save to ${folderName}/` : (window.showSaveFilePicker ? "Save As… stocks.js" : "Download stocks.js")}
          </button>
          <button className="btn secondary" onClick={handleUndo} disabled={history.length === 0} title="Undo (Ctrl/Cmd+Z)">
            ↶ Undo
          </button>
          <button className="btn secondary" onClick={handleRedo} disabled={future.length === 0} title="Redo (Ctrl/Cmd+Shift+Z)">
            ↷ Redo
          </button>
          <button className="btn secondary" onClick={handleClear}>Clear</button>
          {copied && <span className="copied">copied ✓</span>}
          {savedVia === "folder" && <span className="copied">saved to {folderName}/ ✓</span>}
          {savedVia === "picker" && <span className="copied">saved ✓</span>}
          {savedVia === "download" && <span className="copied">downloaded ✓ (check your Downloads folder)</span>}
        </div>
        <div className="footer-hint">
          <span className="history-hint"><kbd>Ctrl/Cmd+Z</kbd> to undo · <kbd>Ctrl/Cmd+Shift+Z</kbd> to redo</span>
          {" · "}
          {supportsFS
            ? <>Folder remembered for this tab only — set it again next time you reopen this tool.</>
            : <>Saves go to your default Downloads folder (browser doesn't support folder memory).</>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
